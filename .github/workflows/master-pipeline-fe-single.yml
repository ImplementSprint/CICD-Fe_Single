# ╔══════════════════════════════════════════════════════════════════╗
# ║  MASTER PIPELINE ORCHESTRATOR (FRONTEND SINGLE)                ║
# ║  Branch Strategy: test → uat → main                             ║
# ║                                                                  ║
# ║  Single frontend project is expected at repository root (.)       ║
# ║    VERCEL_PROJECT_ID_FE_SINGLE (repo secret)                     ║
# ║                                                                  ║
# ║  Optional repository variables for reuse/customization:          ║
# ║    FE_SINGLE_SYSTEM_JSON (preferred; object or one-item array)  ║
# ║    FE_SINGLE_SYSTEM_NAME (default: Frontend-Root)               ║
# ║    FE_SINGLE_WORKING_DIR (default: .)                           ║
# ║    FE_SINGLE_IMAGE_NAME (default: fe-single-web)                ║
# ║    FE_SINGLE_VERCEL_PROJECT_SECRET (required, no default)       ║
# ║    FE_SINGLE_PR_TOKEN_SECRET (default: GH_PR_TOKEN)             ║
# ╚══════════════════════════════════════════════════════════════════╝
name: "Master Pipeline Orchestrator — FE Single"

on:
  push:
    branches: [test, uat, main]
  pull_request:
    branches: [test, uat, main]
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "Run deploy jobs"
        type: boolean
        default: true
      run_promotion:
        description: "Run PR promotion jobs"
        type: boolean
        default: true
      dry_run:
        description: "Preview-only mode (skip deploy/tag push, print PR body)"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  pull-requests: write

# Optional secret for orgs that block GITHUB_TOKEN PR creation:
# GH_PR_TOKEN (preferred) or GHPR_TOKEN (legacy)

concurrency:
  group: master-pipeline-fe-single-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: "Detect Changed Files"
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        with:
          filters: |
            frontend:
              - '**'
            shared:
              - '.github/**'
              - 'package.json'
              - 'sonar-project.properties'

  single-config:
    name: "Resolve FE Single Configuration"
    runs-on: ubuntu-latest
    outputs:
      system_name: ${{ steps.resolve.outputs.system_name }}
      working_dir: ${{ steps.resolve.outputs.working_dir }}
      image_name: ${{ steps.resolve.outputs.image_name }}
      vercel_project_secret: ${{ steps.resolve.outputs.vercel_project_secret }}
      pr_token_secret: ${{ steps.resolve.outputs.pr_token_secret }}
    steps:
      - name: Resolve FE single config
        id: resolve
        env:
          FE_SINGLE_SYSTEM_JSON: ${{ vars.FE_SINGLE_SYSTEM_JSON }}
          FE_SINGLE_SYSTEM_NAME: ${{ vars.FE_SINGLE_SYSTEM_NAME != '' && vars.FE_SINGLE_SYSTEM_NAME || 'Frontend-Root' }}
          FE_SINGLE_WORKING_DIR: ${{ vars.FE_SINGLE_WORKING_DIR != '' && vars.FE_SINGLE_WORKING_DIR || '.' }}
          FE_SINGLE_IMAGE_NAME: ${{ vars.FE_SINGLE_IMAGE_NAME != '' && vars.FE_SINGLE_IMAGE_NAME || 'fe-single-web' }}
          FE_SINGLE_VERCEL_PROJECT_SECRET: ${{ vars.FE_SINGLE_VERCEL_PROJECT_SECRET }}
          FE_SINGLE_PR_TOKEN_SECRET: ${{ vars.FE_SINGLE_PR_TOKEN_SECRET != '' && vars.FE_SINGLE_PR_TOKEN_SECRET || 'GH_PR_TOKEN' }}
        run: |
          if [ -n "${FE_SINGLE_SYSTEM_JSON}" ]; then
            CONFIG=$(echo "${FE_SINGLE_SYSTEM_JSON}" | jq -c 'if type == "array" then .[0] else . end')

            echo "${CONFIG}" | jq -e 'type == "object"' >/dev/null
            echo "${CONFIG}" | jq -e '(.name|type=="string" and length>0) and (.dir|type=="string" and length>0) and (.image|type=="string" and length>0) and (.vercel_project_secret|type=="string" and length>0)' >/dev/null

            SYSTEM_NAME=$(echo "${CONFIG}" | jq -r '.name')
            WORKING_DIR=$(echo "${CONFIG}" | jq -r '.dir')
            IMAGE_NAME=$(echo "${CONFIG}" | jq -r '.image')
            VERCEL_PROJECT_SECRET=$(echo "${CONFIG}" | jq -r '.vercel_project_secret')
            PR_TOKEN_SECRET="${FE_SINGLE_PR_TOKEN_SECRET}"
          else
            SYSTEM_NAME="${FE_SINGLE_SYSTEM_NAME}"
            WORKING_DIR="${FE_SINGLE_WORKING_DIR}"
            IMAGE_NAME="${FE_SINGLE_IMAGE_NAME}"
            VERCEL_PROJECT_SECRET="${FE_SINGLE_VERCEL_PROJECT_SECRET}"
            PR_TOKEN_SECRET="${FE_SINGLE_PR_TOKEN_SECRET}"
          fi

          if [ -z "${PR_TOKEN_SECRET}" ]; then
            PR_TOKEN_SECRET="GH_PR_TOKEN"
          fi

          echo "system_name=${SYSTEM_NAME}" >> "$GITHUB_OUTPUT"
          echo "working_dir=${WORKING_DIR}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "vercel_project_secret=${VERCEL_PROJECT_SECRET}" >> "$GITHUB_OUTPUT"
          echo "pr_token_secret=${PR_TOKEN_SECRET}" >> "$GITHUB_OUTPUT"

  frontend:
    name: "${{ needs.single-config.outputs.system_name }} Pipeline"
    needs: [detect-changes, single-config]
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.shared == 'true'
    uses: ./.github/workflows/front-end-workflow.yml
    with:
      system-dir: ${{ needs.single-config.outputs.working_dir }}
      system-name: ${{ needs.single-config.outputs.system_name }}
      enable-security-scan: true
    secrets: inherit

  sonarcloud:
    name: "SonarCloud — Monorepo Analysis"
    needs: [frontend, detect-changes]
    if: always() && needs.frontend.result != 'cancelled' && (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.shared == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate SonarCloud project access
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "${SONAR_TOKEN}" ] || [ -z "${SONAR_ORGANIZATION}" ] || [ -z "${SONAR_PROJECT_KEY}" ]; then
            echo "❌ SonarCloud preflight failed: one or more required secrets are empty."
            exit 1
          fi

          RESPONSE=$(curl -sS -w "\n%{http_code}" -u "${SONAR_TOKEN}:" "https://sonarcloud.io/api/projects/search?organization=${SONAR_ORGANIZATION}&projects=${SONAR_PROJECT_KEY}")
          HTTP_CODE=$(echo "${RESPONSE}" | tail -n 1)
          BODY=$(echo "${RESPONSE}" | sed '$d')
          TOTAL=$(echo "${BODY}" | jq -r '.paging.total // 0')

          echo "🔎 Sonar preflight: org='${SONAR_ORGANIZATION}', project='${SONAR_PROJECT_KEY}', http=${HTTP_CODE}, total=${TOTAL}"

          if [ "${HTTP_CODE}" -ne 200 ] || [ "${TOTAL}" -lt 1 ]; then
            echo "❌ SonarCloud preflight failed: project not found or token has no access."
            echo "Check SONAR_ORGANIZATION, SONAR_PROJECT_KEY, and SONAR_TOKEN permissions for this repository."
            exit 1
          fi

          echo "✅ SonarCloud preflight passed."

      - name: Run SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

  validate-vercel-secret-vars:
    name: "Validate Vercel Secret-Name Variables"
    runs-on: ubuntu-latest
    needs: [single-config]
    steps:
      - name: Ensure required vars are set
        env:
          PROJECT_SECRET_VAR: ${{ needs.single-config.outputs.vercel_project_secret }}
        run: |
          if [ -z "${PROJECT_SECRET_VAR}" ]; then
            echo "❌ Missing required FE Single Vercel project secret mapping."
            echo "Set FE_SINGLE_SYSTEM_JSON.vercel_project_secret or FE_SINGLE_VERCEL_PROJECT_SECRET."
            exit 1
          fi

  version-test:
    name: "Version Tag — TEST"
    needs: [frontend]
    if: >-
      always() &&
      github.ref == 'refs/heads/test' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    uses: ./.github/workflows/versioning.yml
    with:
      mode: test

  deploy-test:
    name: "TEST — ${{ needs.single-config.outputs.system_name }}"
    needs: [frontend, validate-vercel-secret-vars, single-config]
    if: >-
      always() &&
      github.ref == 'refs/heads/test' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || (github.event.inputs.run_deploy == 'true' && github.event.inputs.dry_run != 'true')) &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    uses: ./.github/workflows/vercel-deploy.yml
    with:
      working-directory: ${{ needs.single-config.outputs.working_dir }}
      environment: preview
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[needs.single-config.outputs.vercel_project_secret] }}

  deploy-uat:
    name: "UAT — ${{ needs.single-config.outputs.system_name }}"
    needs: [frontend, validate-vercel-secret-vars, single-config]
    if: >-
      always() &&
      github.ref == 'refs/heads/uat' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || (github.event.inputs.run_deploy == 'true' && github.event.inputs.dry_run != 'true')) &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    uses: ./.github/workflows/vercel-deploy.yml
    with:
      working-directory: ${{ needs.single-config.outputs.working_dir }}
      environment: preview
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[needs.single-config.outputs.vercel_project_secret] }}

  production-gate:
    name: "Production Readiness Gate"
    needs: [frontend, single-config]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || (github.event.inputs.run_deploy == 'true' && github.event.inputs.dry_run != 'true')) &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    uses: ./.github/workflows/production-gate.yml
    with:
      system-dir: ${{ needs.single-config.outputs.working_dir }}
      app-type: web
    secrets: inherit

  deploy-prod:
    name: "Prod — ${{ needs.single-config.outputs.system_name }}"
    needs: [production-gate, validate-vercel-secret-vars, single-config]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_deploy == 'true' && github.event.inputs.dry_run != 'true'))
    uses: ./.github/workflows/vercel-deploy.yml
    with:
      working-directory: ${{ needs.single-config.outputs.working_dir }}
      environment: production
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[needs.single-config.outputs.vercel_project_secret] }}

  update-about-link:
    name: "Update Repository About Link"
    needs: [deploy-prod]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.deploy-prod.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Update repository homepage URL
        env:
          GH_TOKEN: ${{ secrets.GH_PR_TOKEN }}
          DEPLOYMENT_URL: ${{ needs.deploy-prod.outputs.deployment_url }}
        run: |
          if [ -z "${DEPLOYMENT_URL}" ]; then
            echo "⚠️ No deployment URL available; skipping About homepage update."
            exit 0
          fi

          if [ -z "${GH_TOKEN}" ]; then
            echo "⚠️ GH_PR_TOKEN is not set; skipping About homepage update."
            exit 0
          fi

          if gh api --method PATCH "repos/${{ github.repository }}" -f homepage="${DEPLOYMENT_URL}" >/dev/null 2>&1; then
            echo "✅ Updated repository About homepage to ${DEPLOYMENT_URL}"
          else
            echo "⚠️ Failed to update repository About homepage (token may lack admin rights)."
          fi

  version-main-release:
    name: "Version Tag — MAIN Release"
    needs: [deploy-prod, update-about-link]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true') &&
      (needs.deploy-prod.result == 'success' || needs.deploy-prod.result == 'skipped')
    uses: ./.github/workflows/versioning.yml
    with:
      mode: main

  docker-main:
    name: "GHCR — ${{ needs.single-config.outputs.system_name }}"
    needs: [version-main-release, single-config]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_deploy == 'true' && github.event.inputs.dry_run != 'true'))
    uses: ./.github/workflows/docker-build.yml
    with:
      working-directory: ${{ needs.single-config.outputs.working_dir }}
      image-name: ${{ needs.single-config.outputs.image_name }}
      release-tag: ${{ needs.version-main-release.outputs.version_tag }}
      push-image: true
      scan-vulnerabilities: true
    secrets: inherit

  create-pr-to-uat:
    name: "Create PR → UAT"
    needs: [frontend, version-test, deploy-test, single-config]
    if: >-
      always() &&
      github.ref == 'refs/heads/test' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.run_promotion == 'true') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped') &&
      needs.version-test.result == 'success' &&
      (needs.deploy-test.result == 'success' || needs.deploy-test.result == 'skipped')
    uses: ./.github/workflows/promotion.yml
    with:
      pipeline-kind: single
      direction: test-to-uat
      system1-name: ${{ needs.single-config.outputs.system_name }}
      system1-url: ${{ needs.deploy-test.outputs.deployment_url }}
      system1-result: ${{ needs.frontend.result }}
      version-tag: ${{ needs.version-test.outputs.version_tag }}
      tests-status: ${{ needs.frontend.result }}
      lint-status: ${{ needs.frontend.result }}
      security-status: ${{ needs.frontend.result }}
      sonar-status: ${{ needs.frontend.result }}
      pipeline-result: ${{ (needs.frontend.result == 'success' || needs.frontend.result == 'skipped') && 'success' || (needs.frontend.result == 'cancelled' && 'cancelled' || 'failure') }}
      dry-run: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
    secrets:
      PR_TOKEN: ${{ secrets[needs.single-config.outputs.pr_token_secret] != '' && secrets[needs.single-config.outputs.pr_token_secret] || (secrets.GH_PR_TOKEN != '' && secrets.GH_PR_TOKEN || secrets.GHPR_TOKEN) }}

  create-pr-to-main:
    name: "Create PR → Main"
    needs: [frontend, deploy-uat, single-config]
    if: >-
      always() &&
      github.ref == 'refs/heads/uat' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.run_promotion == 'true') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped') &&
      (needs.deploy-uat.result == 'success' || needs.deploy-uat.result == 'skipped')
    uses: ./.github/workflows/promotion.yml
    with:
      pipeline-kind: single
      direction: uat-to-main
      system1-name: ${{ needs.single-config.outputs.system_name }}
      system1-url: ${{ needs.deploy-uat.outputs.deployment_url }}
      system1-result: ${{ needs.frontend.result }}
      tests-status: ${{ needs.frontend.result }}
      lint-status: ${{ needs.frontend.result }}
      security-status: ${{ needs.frontend.result }}
      sonar-status: ${{ needs.frontend.result }}
      pipeline-result: ${{ (needs.frontend.result == 'success' || needs.frontend.result == 'skipped') && 'success' || (needs.frontend.result == 'cancelled' && 'cancelled' || 'failure') }}
      dry-run: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
    secrets:
      PR_TOKEN: ${{ secrets[needs.single-config.outputs.pr_token_secret] != '' && secrets[needs.single-config.outputs.pr_token_secret] || (secrets.GH_PR_TOKEN != '' && secrets.GH_PR_TOKEN || secrets.GHPR_TOKEN) }}

  pipeline-summary:
    name: "Pipeline Summary"
    needs: [frontend, single-config]
    if: always()
    uses: ./.github/workflows/pipeline-summary.yml
    with:
      pipeline-kind: single
      system1-name: ${{ needs.single-config.outputs.system_name }}
      system1-result: ${{ needs.frontend.result }}

  auto-revert-on-failure:
    name: "Auto Revert on Failure"
    needs:
      [
        single-config,
        frontend,
        sonarcloud,
        validate-vercel-secret-vars,
        version-test,
        deploy-test,
        deploy-uat,
        production-gate,
        deploy-prod,
        update-about-link,
        version-main-release,
        docker-main,
        create-pr-to-uat,
        create-pr-to-main,
        pipeline-summary,
      ]
    if: >-
      always() &&
      github.event_name == 'push' &&
      contains(needs.*.result, 'failure') &&
      !contains(github.event.head_commit.message, '[skip-revert]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !startsWith(github.event.head_commit.message, 'Revert "')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Create rollback commit
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "${BRANCH_NAME}" --depth=50
          git checkout -B "${BRANCH_NAME}" "origin/${BRANCH_NAME}"

          export GIT_EDITOR=:

          if git revert --no-edit "${GITHUB_SHA}"; then
            git commit --amend -m "$(git log -1 --pretty=%B) [skip ci] [skip-revert]"
            echo "✅ Created revert commit from ${GITHUB_SHA}."
          elif git revert -m 1 --no-edit "${GITHUB_SHA}"; then
            git commit --amend -m "$(git log -1 --pretty=%B) [skip ci] [skip-revert]"
            echo "✅ Created merge-revert commit from ${GITHUB_SHA}."
          else
            git revert --abort || true
            SHORT_SHA="${GITHUB_SHA:0:7}"
            git commit --allow-empty -m "ci(auto-revert): manual rollback required for ${SHORT_SHA} [skip ci] [skip-revert]"
            echo "⚠️ Automatic revert conflicted; created marker commit for manual rollback."
          fi

          git push origin "HEAD:${BRANCH_NAME}"

  notify-pipeline:
    name: "Notify Pipeline Status"
    needs: [pipeline-summary, frontend, systems-config, auto-revert-on-failure]
    if: always()
    uses: ./.github/workflows/notifications.yml
    with:
      status: ${{ needs.frontend.result == 'success' && 'success' || (needs.frontend.result == 'cancelled' && 'cancelled' || 'failure') }}
      system-dir: ${{ needs.systems-config.outputs.system_name }}
      pipeline-type: FE Single Master
      error-details: ${{ needs.frontend.result != 'success' && needs.frontend.result != 'skipped' && 'Master FE single pipeline reported failures.' || '' }}
      deployment-url: ${{ github.ref_name == 'main' && needs.deploy-prod.outputs.deployment_url || (github.ref_name == 'uat' && needs.deploy-uat.outputs.deployment_url || (github.ref_name == 'test' && needs.deploy-test.outputs.deployment_url || '')) }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
