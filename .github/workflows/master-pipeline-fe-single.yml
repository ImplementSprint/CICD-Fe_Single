# ╔══════════════════════════════════════════════════════════════════╗
# ║  MASTER PIPELINE ORCHESTRATOR (FRONTEND SINGLE)                ║
# ║  Branch Strategy: test → uat → main                             ║
# ║                                                                  ║
# ║  Single frontend project is expected at repository root (.)       ║
# ║    VERCEL_PROJECT_ID_FE_SINGLE (repo secret)                     ║
# ║                                                                  ║
# ║  Optional repository variables for reuse/customization:          ║
# ║    FE_SINGLE_SYSTEM_NAME (default: Frontend-Root)               ║
# ║    FE_SINGLE_WORKING_DIR (default: .)                           ║
# ║    FE_SINGLE_IMAGE_NAME (default: fe-single-web)                ║
# ║    FE_SINGLE_VERCEL_PROJECT_SECRET (required, no default)       ║
# ╚══════════════════════════════════════════════════════════════════╝
name: "Master Pipeline Orchestrator — FE Single"

on:
  push:
    branches: [test, uat, main]
  pull_request:
    branches: [test, uat, main]

permissions:
  contents: write
  packages: write
  pull-requests: write

# Optional secret for orgs that block GITHUB_TOKEN PR creation:
# GH_PR_TOKEN
# (can be defined at organization or repository level)

concurrency:
  group: master-pipeline-fe-single-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: "Detect Changed Files"
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - '**'
            shared:
              - '.github/**'
              - 'package.json'
              - 'sonar-project.properties'

  frontend:
    name: "${{ vars.FE_SINGLE_SYSTEM_NAME != '' && vars.FE_SINGLE_SYSTEM_NAME || 'Frontend-Root' }} Pipeline"
    needs: [detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.shared == 'true'
    uses: ./.github/workflows/front-end-workflow.yml
    with:
      system-dir: ${{ vars.FE_SINGLE_WORKING_DIR != '' && vars.FE_SINGLE_WORKING_DIR || '.' }}
      system-name: ${{ vars.FE_SINGLE_SYSTEM_NAME != '' && vars.FE_SINGLE_SYSTEM_NAME || 'Frontend-Root' }}
      enable-security-scan: true
    secrets: inherit

  sonarcloud:
    name: "SonarCloud — Analysis"
    needs: [frontend]
    if: >-
      always() &&
      needs.frontend.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate SonarCloud secrets
        id: sonar-check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "${SONAR_TOKEN}" ] || [ -z "${SONAR_ORGANIZATION}" ] || [ -z "${SONAR_PROJECT_KEY}" ]; then
            echo "run_scan=false" >> $GITHUB_OUTPUT
            echo "ℹ️ SonarCloud secrets are missing. Skipping SonarCloud scan."
          else
            echo "run_scan=true" >> $GITHUB_OUTPUT
          fi

      - name: Download Coverage Artifact
        if: needs.frontend.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: ${{ vars.FE_SINGLE_SYSTEM_NAME != '' && vars.FE_SINGLE_SYSTEM_NAME || 'Frontend-Root' }}-coverage
          path: ${{ vars.FE_SINGLE_WORKING_DIR != '' && vars.FE_SINGLE_WORKING_DIR || '.' }}/coverage
        continue-on-error: true

      - name: Run SonarCloud Scan
        if: steps.sonar-check.outputs.run_scan == 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

  validate-vercel-secret-vars:
    name: "Validate Vercel Secret-Name Variables"
    runs-on: ubuntu-latest
    steps:
      - name: Ensure required vars are set
        env:
          PROJECT_SECRET_VAR: ${{ vars.FE_SINGLE_VERCEL_PROJECT_SECRET }}
        run: |
          if [ -z "${PROJECT_SECRET_VAR}" ]; then
            echo "❌ Missing required repository variable FE_SINGLE_VERCEL_PROJECT_SECRET."
            echo "Set FE_SINGLE_VERCEL_PROJECT_SECRET to the secret name that stores your Vercel project ID."
            exit 1
          fi

  version-test:
    name: "Version Tag — TEST"
    needs: [frontend]
    if: >-
      always() &&
      github.ref == 'refs/heads/test' && github.event_name == 'push' &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Push Version Tag
        id: version
        run: |
          PREFIX="test-v"
          LATEST=$(git tag -l "${PREFIX}[0-9]*.[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | head -n 1)

          if [ -z "${LATEST}" ]; then
            NEXT_VERSION="1.0.0.0"
          else
            RAW_VERSION="${LATEST#${PREFIX}}"
            IFS='.' read -r MAJOR MINOR PATCH BUILD <<< "${RAW_VERSION}"
            NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}.$((BUILD + 1))"
          fi

          TAG="${PREFIX}${NEXT_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "ℹ️ Tag already exists: ${TAG}"
            exit 0
          fi

          git tag -a "${TAG}" -m "TEST version ${TAG}"
          git push origin "${TAG}"

          echo "tag=${TAG}" >> $GITHUB_OUTPUT

  deploy-test:
    name: "TEST — ${{ vars.FE_SINGLE_SYSTEM_NAME != '' && vars.FE_SINGLE_SYSTEM_NAME || 'Frontend-Root' }}"
    needs: [frontend, validate-vercel-secret-vars]
    if: >-
      always() &&
      github.ref == 'refs/heads/test' && github.event_name == 'push' &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    uses: ./.github/workflows/vercel-deploy.yml
    with:
      working-directory: ${{ vars.FE_SINGLE_WORKING_DIR != '' && vars.FE_SINGLE_WORKING_DIR || '.' }}
      environment: preview
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[vars.FE_SINGLE_VERCEL_PROJECT_SECRET] }}

  deploy-uat:
    name: "UAT — ${{ vars.FE_SINGLE_SYSTEM_NAME != '' && vars.FE_SINGLE_SYSTEM_NAME || 'Frontend-Root' }}"
    needs: [frontend, validate-vercel-secret-vars]
    if: >-
      always() &&
      github.ref == 'refs/heads/uat' && github.event_name == 'push' &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    uses: ./.github/workflows/vercel-deploy.yml
    with:
      working-directory: ${{ vars.FE_SINGLE_WORKING_DIR != '' && vars.FE_SINGLE_WORKING_DIR || '.' }}
      environment: preview
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[vars.FE_SINGLE_VERCEL_PROJECT_SECRET] }}

  production-gate:
    name: "Production Readiness Gate"
    needs: [frontend]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    uses: ./.github/workflows/production-gate.yml
    with:
      system-dir: ${{ vars.FE_SINGLE_WORKING_DIR != '' && vars.FE_SINGLE_WORKING_DIR || '.' }}
      app-type: web
    secrets: inherit

  deploy-prod:
    name: "Prod — ${{ vars.FE_SINGLE_SYSTEM_NAME != '' && vars.FE_SINGLE_SYSTEM_NAME || 'Frontend-Root' }}"
    needs: [production-gate, validate-vercel-secret-vars]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/vercel-deploy.yml
    with:
      working-directory: ${{ vars.FE_SINGLE_WORKING_DIR != '' && vars.FE_SINGLE_WORKING_DIR || '.' }}
      environment: production
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[vars.FE_SINGLE_VERCEL_PROJECT_SECRET] }}

  version-main-release:
    name: "Version Tag — MAIN Release"
    needs: [deploy-prod]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      (needs.deploy-prod.result == 'success' || needs.deploy-prod.result == 'skipped')
    outputs:
      version_tag: ${{ steps.version.outputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Push Release Tag
        id: version
        run: |
          TEST_PREFIX="test-v"
          MAIN_PREFIX="main-v"

          LATEST_TEST=$(git tag -l "${TEST_PREFIX}[0-9]*.[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | head -n 1)
          if [ -z "${LATEST_TEST}" ]; then
            echo "❌ No test version tag found. main release tag requires a prior test tag."
            exit 1
          fi

          VERSION_FROM_TEST="${LATEST_TEST#${TEST_PREFIX}}"
          TAG="${MAIN_PREFIX}${VERSION_FROM_TEST}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "ℹ️ Tag already exists: ${TAG}"
            exit 0
          fi

          git tag -a "${TAG}" -m "MAIN release ${TAG}"
          git push origin "${TAG}"

          echo "tag=${TAG}" >> $GITHUB_OUTPUT

  docker-main:
    name: "GHCR — ${{ vars.FE_SINGLE_SYSTEM_NAME != '' && vars.FE_SINGLE_SYSTEM_NAME || 'Frontend-Root' }}"
    needs: [version-main-release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/docker-build.yml
    with:
      working-directory: ${{ vars.FE_SINGLE_WORKING_DIR != '' && vars.FE_SINGLE_WORKING_DIR || '.' }}
      image-name: ${{ vars.FE_SINGLE_IMAGE_NAME != '' && vars.FE_SINGLE_IMAGE_NAME || 'fe-single-web' }}
      release-tag: ${{ needs.version-main-release.outputs.version_tag }}
      push-image: true
      scan-vulnerabilities: true
    secrets: inherit

  create-pr-to-uat:
    name: "Create PR → UAT"
    needs: [frontend, version-test, deploy-test]
    if: >-
      always() &&
      github.ref == 'refs/heads/test' && github.event_name == 'push' &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped') &&
      needs.version-test.result == 'success' &&
      (needs.deploy-test.result == 'success' || needs.deploy-test.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Validate PAT for PR creation
        env:
          GH_PR_TOKEN: ${{ secrets.GH_PR_TOKEN }}
        run: |
          if [ -z "${GH_PR_TOKEN}" ]; then
            echo "❌ Missing PAT secret for PR creation."
            echo "Add GH_PR_TOKEN as an organization or repository secret."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PR_TOKEN }}

      - name: Create PR from test → uat
        env:
          GH_TOKEN: ${{ secrets.GH_PR_TOKEN }}
        run: |
          git fetch origin test uat --no-tags
          COMMITS_AHEAD=$(git rev-list --count origin/uat..origin/test || echo 0)
          if [ "${COMMITS_AHEAD}" -eq 0 ]; then
            echo "ℹ️ No commits between test and uat. Skipping PR creation."
            exit 0
          fi

          EXISTING_PR=$(gh pr list --base uat --head test --state open --json number --jq '.[0].number' 2>/dev/null || true)
          APP_URL="${{ needs.deploy-test.outputs.deployment_url }}"
          VERSION_TAG="${{ needs.version-test.outputs.version_tag }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          PR_BODY=$(cat <<ENDOFBODY
          ## 🚀 Promote TEST → UAT

          ### 📋 Pre-merge Checklist
          - [ ] Verified ${{ vars.FE_SINGLE_SYSTEM_NAME != '' && vars.FE_SINGLE_SYSTEM_NAME || 'Frontend-Root' }} on TEST
          - [ ] Ready for UAT validation

          ### 🔗 Vercel TEST Deployment Link
          - ${{ vars.FE_SINGLE_SYSTEM_NAME != '' && vars.FE_SINGLE_SYSTEM_NAME || 'Frontend-Root' }}: ${APP_URL:-Not deployed (no changes)}

          ### 🔍 Details
          - **Source branch:** test
          - **Target branch:** uat
          - **Version tag:** \`${VERSION_TAG}\`
          - **Commit:** \`${SHORT_SHA}\`
          - **Triggered at:** ${TIMESTAMP}
          ENDOFBODY
          )

          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --body "$PR_BODY"
            exit 0
          fi

          gh pr create --base uat --head test --title "🚀 Release: Promote TEST → UAT (${SHORT_SHA})" --body "$PR_BODY"

  create-pr-to-main:
    name: "Create PR → Main"
    needs: [frontend, deploy-uat]
    if: >-
      always() &&
      github.ref == 'refs/heads/uat' && github.event_name == 'push' &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped') &&
      (needs.deploy-uat.result == 'success' || needs.deploy-uat.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Validate PAT for PR creation
        env:
          GH_PR_TOKEN: ${{ secrets.GH_PR_TOKEN }}
        run: |
          if [ -z "${GH_PR_TOKEN}" ]; then
            echo "❌ Missing PAT secret for PR creation."
            echo "Add GH_PR_TOKEN as an organization or repository secret."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PR_TOKEN }}

      - name: Create PR from uat → main
        env:
          GH_TOKEN: ${{ secrets.GH_PR_TOKEN }}
        run: |
          git fetch origin uat main --no-tags
          COMMITS_AHEAD=$(git rev-list --count origin/main..origin/uat || echo 0)
          if [ "${COMMITS_AHEAD}" -eq 0 ]; then
            echo "ℹ️ No commits between uat and main. Skipping PR creation."
            exit 0
          fi

          EXISTING_PR=$(gh pr list --base main --head uat --state open --json number --jq '.[0].number' 2>/dev/null || true)
          APP_URL="${{ needs.deploy-uat.outputs.deployment_url }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          PR_BODY=$(cat <<ENDOFBODY
          ## 🚀 Promote UAT → Production

          ### 📋 Pre-merge Checklist
          - [ ] Verified ${{ vars.FE_SINGLE_SYSTEM_NAME != '' && vars.FE_SINGLE_SYSTEM_NAME || 'Frontend-Root' }} on UAT
          - [ ] All acceptance criteria met

          ### 🔗 Vercel UAT Deployment Link
          - ${{ vars.FE_SINGLE_SYSTEM_NAME != '' && vars.FE_SINGLE_SYSTEM_NAME || 'Frontend-Root' }}: ${APP_URL:-Not deployed (no changes)}

          ### 🔍 Details
          - **Source branch:** uat
          - **Target branch:** main
          - **Commit:** \`${SHORT_SHA}\`
          - **Triggered at:** ${TIMESTAMP}
          ENDOFBODY
          )

          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --body "$PR_BODY"
            exit 0
          fi

          gh pr create --base main --head uat --title "🚀 Release: Promote UAT → Production (${SHORT_SHA})" --body "$PR_BODY"

  pipeline-summary:
    name: "Pipeline Summary"
    needs: [frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Pipeline Results
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Branch:     ${{ github.ref_name }}"
          echo "Frontend:   ${{ needs.frontend.result }}"

  auto-revert-on-failure:
    name: "Auto Revert Failed Commit"
    needs:
      - frontend
      - sonarcloud
      - version-test
      - deploy-test
      - deploy-uat
      - create-pr-to-uat
      - create-pr-to-main
    if: >-
      always() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/test' || github.ref == 'refs/heads/uat') &&
      github.actor != 'github-actions[bot]' &&
      contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PR_TOKEN != '' && secrets.GH_PR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Revert failed commit
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TARGET_SHA="${{ github.sha }}"
          BRANCH_NAME="${{ github.ref_name }}"

          git fetch origin "${BRANCH_NAME}" --no-tags
          git checkout -B "${BRANCH_NAME}" "origin/${BRANCH_NAME}"

          PARENT_COUNT=$(( $(git rev-list --parents -n 1 "${TARGET_SHA}" | wc -w) - 1 ))
          if [ "${PARENT_COUNT}" -gt 1 ]; then
            git revert -m 1 --no-edit "${TARGET_SHA}"
            REVERT_STATUS=$?
          else
            git revert --no-edit "${TARGET_SHA}"
            REVERT_STATUS=$?
          fi

          if [ "${REVERT_STATUS}" -ne 0 ]; then
            git revert --abort || true
            echo "⚠️ Auto-revert could not be applied cleanly (likely conflict or already reverted)."
            echo "⚠️ Manual revert is required for ${TARGET_SHA}."
            exit 0
          fi

          REVERT_MSG=$(git log -1 --pretty=%B)
          git commit --amend -m "${REVERT_MSG}"$'\n\n[skip ci]'
          git push origin HEAD:"${BRANCH_NAME}"
